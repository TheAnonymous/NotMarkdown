name: Bug report
description: Report a reproducible parser, editor, package, or interoperability problem.
title: "bug: "
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Format or conformance
        - Rust CLI, LSP, or TUI
        - Browser Studio
        - Reference toolchain
        - VS Code or JetBrains integration
        - Website or release packaging
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.2.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include exact commands and a minimal inert source example. Do not attach secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Windows 11, macOS 15, Ubuntu 24.04, browser version…
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This report does not disclose a vulnerability or private document data.
          required: true
