name: Dependency security audit

on:
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/package.json"
      - "**/package-lock.json"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/package.json"
      - "**/package-lock.json"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: reference-toolchain
            directory: notmarkdown-reference-parser
          - component: Studio
            directory: notmarkdown-web-editor
          - component: VS-Code
            directory: notmarkdown-vscode
          - component: Desktop-scaffold
            directory: integrations/desktop
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - working-directory: ${{ matrix.directory }}
        run: npm audit --omit=dev --audit-level=high

  cargo-audit:
    name: RustSec audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: notmarkdown-rust
